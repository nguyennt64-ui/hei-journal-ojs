services:
  - type: web
    name: hei-journal-ojs
    runtime: docker
    plan: free
    healthCheckPath: /health.php
    envVars:
      - key: DB_HOST
        value: 127.0.0.1
      - key: DB_USER
        value: ojs
      - key: DB_PASSWORD
        value: ojs
      - key: DB_NAME
        value: ojs_local
      - key: BASE_URL
        value: https://hei-journal-ojs-3wso.onrender.com
      - key: FILES_DIR
        value: /var/www/files
